<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:#0f172a;
            color:white;
        }

        .container{

            width:80%;
            margin:auto;
            text-align:center;
            padding-top:100px;
        }

        h1{
            font-size:50px;
        }

        p{
            font-size:20px;
            color:lightgray;
        }

        .card{

            background:#1e293b;
            padding:40px;
            border-radius:15px;
            margin-top:40px;
        }

        select{

            width:60%;
            padding:12px;
            margin-top:20px;
            border-radius:8px;
            font-size:16px;
        }

        button{

            margin-top:25px;
            padding:14px 30px;

            border:none;
            border-radius:8px;

            background:#3b82f6;
            color:white;

            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#2563eb;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>AI Interview Preparation System</h1>

        <p>Practice interviews with AI</p>

        <div class="card">

            <h2>Select Interview Topic</h2>

            <select>

                <option>Python</option>
                <option>Data Science</option>
                <option>Machine Learning</option>
                <option>SQL</option>

            </select>

            <br>

            <form action="/interview">
                <button>
                    Start Interview
                </button>
            </form>

        </div>

    </div>

</body>

</html>
