<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Interview System</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{

            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;

            text-align:center;
        }

        h1{
            margin-bottom:30px;
        }

        input{

            width:100%;
            padding:12px;
            margin-top:10px;
            border-radius:8px;
            border:1px solid gray;
        }

        button{

            width:100%;
            padding:12px;
            margin-top:20px;

            border:none;
            border-radius:8px;

            background:#243b55;
            color:white;

            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#141e30;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>AI Interview System</h1>

        <form action="/welcome" method="POST">

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>

</html>
