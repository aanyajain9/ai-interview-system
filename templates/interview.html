<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Interview</title>

    

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:#0f172a;
            color:white;
        }

        .chat-container{

            width:70%;
            margin:auto;
            margin-top:50px;
        }

        .chat-box{

            background:#1e293b;
            padding:20px;
            border-radius:15px;

            height:500px;

            overflow-y:auto;

            display:flex;
            flex-direction:column;

            gap:15px;
        }

        .ai-message{

            background:#334155;
            padding:15px;
            border-radius:15px;

            width:70%;

            line-height:1.5;
        }
        .user-message{

            background:#2563eb;
            padding:15px;
            border-radius:15px;

            width:70%;

            margin-left:auto;

            line-height:1.5;
        }

        .input-area{

            margin-top:20px;
            display:flex;
            gap:10px;
        }

        input{

            flex:1;
            padding:14px;
            border:none;
            border-radius:8px;
        }

        button{

            padding:14px 25px;

            border:none;
            border-radius:8px;

            background:#3b82f6;
            color:white;

            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="chat-container">

        <h1>AI Mock Interview</h1>
        <h2>Score: {{ score }}</h2>

        <div class="chat-box">

            

        {% for chat in chat_history %}

            {% if chat.type == "user" %}

                <div class="user-message">
                    {{ chat.message }}
                </div>

            {% else %}

                <div class="ai-message">
                    {{ chat.message }}
                </div>

            {% endif %}

        {% endfor %}    
        </div>

        <form method="POST">

            <div class="input-area">

                <input type="text"
                       name="answer"
                       placeholder="Type your answer..."
                       required>

                <button type="submit">
                    Send
                </button>

            </div>

        </form>

    </div>

</body>

</html>
