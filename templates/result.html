<!DOCTYPE html>
<html>

<head>

    <title>Interview Result</title>

    

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .card{

            background:#1e293b;

            padding:40px;

            border-radius:15px;

            text-align:center;
        }

        button{

            padding:12px 25px;

            border:none;

            border-radius:8px;

            background:#3b82f6;

            color:white;

            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="card">

        <h1>Interview Completed 🎉</h1>

        <h2>Final Score: {{ score }}</h2>

        <h2>{{ performance }}</h2>

        <h2>Category: {{ category }}</h2>

        <h2>Questions Attempted: 4</h2>

        <a href="/">
            <button>Back To Dashboard</button>
        </a>

    </div>

</body>

</html>
